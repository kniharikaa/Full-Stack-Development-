<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Event Registration</h1>
    <form>
        <label for="name1">NAME: </label>
        <input type="text" name="name" id="name1">
        <br/>
        <br/>


        <label for="email1">Email:</label>
        <input type="text" name="email" id="email1">
        <br/>
        <br/>


        <label for="Phone"> Phone: </label>
        <input type="tel" name="phone" id="Phone">
        <br/>
        <br/>


        <label for="occp">Occupation: </label>
        <select name="course" id="occp" value="other">
            <option value="html">Docter</option>
            <option value="css">Engineer</option>
            <option value="js">Chief</option>
            <option value="python">Teacher</option>
        </select>
        <br/>
        <br/>

        <fieldset>
            <legend>Topic of Interest</legend>
            <input type="checkbox" name="html" id="check1" value="html">
            <label for="check1">HTML</label><BR>

            <input type="checkbox" name="js" id="check1" value="jss">
            <label for="check1">CSS</label><br>
        
            <input type="checkbox" name="python" id="check1" value="css">
            <label for="check1">JS</label><BR/><br/>

        </fieldset>
        
        
        <label for="xyz">Comments: </label><br>
        <textarea name="comments" id="xyz" cols="30" rows="10" placeholder="Enter you text here"></textarea>
        <br/><br/>
        
        <input type="button" value="Submit">
    </form>
</body>
</html>
