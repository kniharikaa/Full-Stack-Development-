<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Job Application Form</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name"><br/><br/>

        <label for="email">Email:</label>
        <input type="text" id="email"><br/><br/>

        <label for="phone">Phone:</label>
        <input type="text" id="phone"><br/><br/>

        <label for="">Resume:</label>
        <input type="file" value="Choose File"><br/><br/>

        <label for="">Experience (years):</label>
        <input type="number"><br/><br/>

        <fieldset>
            <legend>SKILLS:</legend>
            <input type="checkbox" name="html" id="check1" value="html">
            <label for="check1">HTML</label><BR>

            <input type="checkbox" name="js" id="check1" value="jss">
            <label for="check1">CSS</label><br>
        
            <input type="checkbox" name="python" id="check1" value="css">
            <label for="check1">JS</label><BR/>

        </fieldset><br/>


        <label for="">Highest Qualification:</label>
        <select name="Education" id="edu">
            <option value="High School">High School</option>
            <option value="SSHS">SSHS</option>
            <option value="Graduation">Graduation</option>
        </select><br/><br/>

        <fieldset>

            <label for="">Availability:</label><br/>

            <input type="radio" id="check" name="option">
            <label for="check">Full Time</label>

            <input type="radio" id="check2" name="option">
            <label for="check2">Part Time</label><br/>
    
        </fieldset>
        <br/>
        <br/>


        <label for="comment">Additional Comments:</label><br>
        <textarea name="comments" id="comment" placeholder="Enter text"></textarea>


        <br/><br/>
        

        <input type="button" value="Submit">

    </form>
</body>
</html>
